spring.application.name=step03_Security_JWT

server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true


# JWT secret key (secrets? ??)
#spring.jwt.secret=SahL5G83mGzrulJzffw-eD7RqphsXluJPBwxu0ncBFo
spring.jwt.secret=${SPRING_JWT_SECRET}

#swagger setting
spring.mvc.pathmatch.matching-strategy=ant_path_matcher

server.port=8080

#spring.datasource.url=jdbc:mysql://mysql_db:3306/jwt_db?characterEncoding=UTF-8
#spring.datasource.username=jang
#spring.datasource.password=jang1234

spring.datasource.url=${MYSQL_URL}
spring.datasource.username=${MYSQL_USER}
spring.datasource.password=${MYSQL_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Spring JPA
spring.jpa.database=mysql
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.generate-ddl=false
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true


