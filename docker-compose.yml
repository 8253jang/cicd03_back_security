version: '3.8'

services:
  app:
    image: ${DOCKER_USERNAME}/jwt-app:latest
    container_name: jwt_app
    ports:
      - "8080:8080"
    environment:
      #SPRING_JWT_SECRET: ${SPRING_JWT_SECRET}
      MYSQL_URL: jdbc:mysql://mysql_db:3306/jwt_db?characterEncoding=UTF-8
      MYSQL_USER: jang
      MYSQL_PASSWORD: jang1234
    networks:
      - mynet
    depends_on:
      - dummy_mysql  # 실제 컨테이너는 안 띄움, depends_on 형식 맞추기용 (아래 설명 참고)

