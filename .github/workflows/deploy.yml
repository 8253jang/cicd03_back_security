name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: mvnw 실행 권한 부여
        run: chmod +x ./mvnw

      - name: Maven 빌드 실행
        run: ./mvnw clean package -DskipTests

      - name: Docker Hub 로그인
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Docker 이미지 빌드
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/jwt-app:latest .

      - name: Docker 이미지 푸시
        run: docker push ${{ secrets.DOCKER_USERNAME }}/jwt-app:latest

      # ✅ .env 파일 동적 생성
      - name: .env 파일 생성
        run: |
          echo "DOCKER_USERNAME=${{ secrets.DOCKER_USERNAME }}" > .env
        #  echo "SPRING_JWT_SECRET=${{ secrets.SPRING_JWT_SECRET }}" >> .env

      # ✅ docker-compose.yml + .env 전송
      - name: EC2에 docker-compose.yml + .env 전송
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_PRIVATE_KEY }}
          source: "docker-compose.yml,.env"
          target: "~/cicd-docker"

      - name: EC2에서 docker-compose 실행
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_PRIVATE_KEY }}
          script: |
            cd ~/cicd-docker
            docker pull ${{ secrets.DOCKER_USERNAME }}/jwt-app:latest
            docker-compose down
            docker-compose up -d
